<!DOCTYPE html>
<html class="light" lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 저널 — 상세</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #fff8f5;
        -webkit-font-smoothing: antialiased;
      }
      .reading-progress {
        height: 2px;
        width: 35%;
        background-color: #6b5c4c;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 100;
      }
    </style>
  </head>
  <body class="font-['Be_Vietnam_Pro'] text-[#1e1b18]">
    <div class="reading-progress"></div>

    <header class="sticky top-0 z-40 border-b border-stone-200/60 bg-[#f5f2ed]/95 backdrop-blur">
      <div class="mx-auto flex w-full max-w-[1120px] items-center justify-between px-6 py-4">
        <a href="{{ url_for('post_list') }}" class="text-xl font-bold italic">따뜻한 저널</a>
        <nav class="hidden items-center gap-6 md:flex">
          <a href="{{ url_for('post_list') }}" class="border-b-2 border-[#1e1b18] pb-1 font-semibold">읽기</a>
          <a href="{{ url_for('post_create') }}" class="text-stone-500 hover:text-stone-700">쓰기</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-[720px] px-6 py-14">
      <div class="mb-8 flex items-center justify-between">
        <a href="{{ url_for('post_list') }}" class="text-sm font-semibold text-[#6b5c4c]">← 목록으로</a>
        <a href="{{ url_for('post_create') }}" class="rounded-full border border-stone-300 px-4 py-2 text-xs font-bold tracking-widest text-stone-600">새 글 쓰기</a>
      </div>

      <article>
        <header class="mb-8">
          <span class="mb-3 inline-block rounded bg-[#f1dcc8] px-3 py-1 text-xs font-bold uppercase tracking-[0.15em] text-[#6f6050]">기록</span>
          <h1 class="mb-4 text-4xl font-bold leading-tight md:text-5xl">{{ post.title }}</h1>
          <p class="border-y border-stone-200 py-4 text-sm text-stone-500">작성일 {{ post.created_at }}</p>
        </header>

        <section class="space-y-5 text-lg leading-relaxed text-stone-800">
          {% for line in post.content.split('\n') %}
          <p>{{ line }}</p>
          {% endfor %}
        </section>

        <footer class="mt-12 border-t border-stone-200 pt-6">
          <a href="{{ url_for('post_list') }}" class="text-sm font-semibold text-[#6b5c4c]">← 목록으로 돌아가기</a>
        </footer>
      </article>
    </main>
  </body>
</html>
